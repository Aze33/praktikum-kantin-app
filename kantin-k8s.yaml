apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-kantin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-api
        # JANGAN LUPA: Ganti dengan username docker kamu!
        image: <USERNAME_DOCKER_KAMU>/kantin-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        # INJEKSI IDENTITAS (Tugas 2)
        env:
        - name: NAMA_MAHASISWA
          value: "Zahran Zaidan Saputra"
        - name: NIM_MAHASISWA
          value: "2415429"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000
  type: ClusterIP # Ubah ke ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-kantin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-ui
        image: zahranz/kantin-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP # Ubah ke ClusterIP