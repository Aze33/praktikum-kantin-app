version: "3.8"
services:
  # Layanan Backend (API)
  backend-service:
    build: ./backend
    ports:
      - "5000:5000"
    container_name: api-server-compose

  # Layanan Frontend (UI)
  frontend-service:
    build: ./frontend
    ports:
      - "8081:80"
    container_name: ui-server-compose
    depends_on:
      - backend-service